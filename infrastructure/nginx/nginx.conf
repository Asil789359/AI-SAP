user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  65535;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access_log main buffer=16k;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cloudflare/LB Compatibility
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Upstreams for Load Balancing
    upstream erp_web {
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream erp_api {
        server api:3001 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream live_feed {
        server live-feed:8004 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    server {
        listen 80;
        server_name localhost;

        # Direct Static Files for Web (Optimization)
        location /_next/static {
            proxy_cache_valid 200 60m;
            proxy_pass http://erp_web;
            expires 365d;
        }

        # Main Web Interface
        location / {
            proxy_pass http://erp_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API (NestJS)
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://erp_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Live Feed (FastAPI)
        location /feeds/ {
            proxy_pass http://live_feed;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off; # Real-time streaming
        }
    }
}
